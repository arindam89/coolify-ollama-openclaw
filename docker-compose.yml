services:
  openclaw-ollama:
    build: .
    container_name: openclaw-ollama
    restart: unless-stopped
    ports:
      - "18789:18789"
    environment:
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}           # API key from ollama.com
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - TZ=${TZ:-UTC}
    volumes:
      - ollama_data:/root/.ollama
      - openclaw_config:/root/.openclaw
      - openclaw_workspace:/root/.openclaw/workspace
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:18789/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  ollama_data:
  openclaw_config:
  openclaw_workspace: